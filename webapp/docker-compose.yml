version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: moneytracer
      POSTGRES_PASSWORD: moneytracer
      POSTGRES_DB: moneytracer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://moneytracer:moneytracer@db:5432/moneytracer
      SECRET_KEY: change-this-secret-key-in-production-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"

volumes:
  pgdata:
